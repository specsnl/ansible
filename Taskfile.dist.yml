version: "3"

silent: true

vars:
  DOCKER_REPO: ghcr.io
  DOCKER_OWNER: specsnl
  DOCKER_IMAGE_NAME: ansible
  # Latatest version of Hadolint: https://hub.docker.com/r/hadolint/hadolint/tags or https://github.com/hadolint/hadolint/releases
  HADOLINT_TAG_VERSION: v2.14.0
  # Latatest version of utils: https://github.com/specsnl/utils/pkgs/container/utils or https://github.com/specsnl/utils/releases
  UTILS_TAG_VERSION: 1.11.4
  # Latest version of UV: https://github.com/astral-sh/uv/releases
  UV_VERSION: "0.11.19"

includes:
  scripts:
    taskfile: ./scripts
    dir: ./scripts

# env:
#   BUILDKIT_PROGRESS: plain

tasks:
  build:
    desc: Build both ansible and k8s images
    deps:
      - build:ansible
      - build:k8s

  build:ansible:
    desc: Build the ansible image
    cmds:
      - docker build
        --tag {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}:latest
        --target ansible
        .

  build:k8s:
    desc: Build the k8s image
    cmds:
      - docker build
        --tag {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}/k8s:latest
        --target k8s
        .

  deps:upgrade:
    desc: Update uv.lock (upgrade all dependencies to their latest allowed versions)
    cmds:
      - uv lock --upgrade

  lint:
    desc: Apply a Dockerfile linter (https://github.com/hadolint/hadolint)
    cmds:
      - docker run
        --interactive
        --rm
        --volume $(pwd)/.hadolint.yml:/.hadolint.yml
        hadolint/hadolint:{{.HADOLINT_TAG_VERSION}}
        hadolint
        -
        < Dockerfile

  shell:
    desc: Interactive shell with Ansible
    interactive: true
    cmds:
      - docker run
        --interactive
        --tty
        --rm
        --user $(id -u):$(id -g)
        --volume $(pwd):/ansible
        --env ANSIBLE_CONFIG="/ansible/ansible"
        {{.DOCKER_REPO}}/{{.DOCKER_OWNER}}/{{.DOCKER_IMAGE_NAME}}:latest
